name: JianYing Bot

on:
  schedule:
    # 这里的 cron 表达式使用 UTC 时间 (北京时间 - 8小时)
    # 00:00 UTC = 08:00 北京时间
    # 04:00 UTC = 12:00 北京时间
    # 08:00 UTC = 16:00 北京时间
    # 12:00 UTC = 20:00 北京时间
    - cron: '0 0,4,8,12 * * *'
  workflow_dispatch: # 允许手动点击运行，方便测试

jobs:
  check_merchant:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install httpx

      - name: Run script
        env:
          # 将 GitHub Secrets 注入到系统环境变量
          MY_API_KEY: ${{ secrets.WEGAME_API_KEY }}
          MY_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: python main.py
